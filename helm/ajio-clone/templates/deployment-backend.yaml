{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ajio.fullname" . }}-backend
  labels:
    {{ include "ajio.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "ajio.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "ajio.fullname" . }}-backend
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env:
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: "{{ $v }}"
            {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- if .Values.config.create }}
          volumeMounts:
            - name: ajio-config
              mountPath: {{ .Values.config.mountPath }}
              readOnly: true
          {{- end }}
      {{- if .Values.config.create }}
      volumes:
        - name: ajio-config
          configMap:
            name: {{ include "ajio.fullname" . }}-config
            optional: {{ .Values.config.optional }}
            {{- if .Values.config.items }}
            items:
              {{- toYaml .Values.config.items | nindent 14 }}
            {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 6 }}
      {{- end }}
      {{- toYaml .Values.tolerations | indent 6 }}
      {{- toYaml .Values.affinity | indent 6 }}

{{- end }}
